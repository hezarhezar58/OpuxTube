name: Android CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}
          cache-cleanup: on-success
          add-job-summary: on-failure

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Assemble debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 7

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/build/reports/tests/
            **/build/test-results/
          retention-days: 7

      - name: Tailscale connect
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          version: latest

      - name: Install debug APK on phone via Tailscale
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          PHONE_IP: ${{ secrets.PHONE_TAILSCALE_IP }}
        run: |
          set -euo pipefail
          if [ -z "${PHONE_IP:-}" ]; then
            echo "PHONE_TAILSCALE_IP secret not set; skipping device install."
            exit 0
          fi
          ADB="$ANDROID_HOME/platform-tools/adb"
          APK=$(ls app/build/outputs/apk/debug/*.apk | head -1)
          echo "Installing $APK on $PHONE_IP:5555"
          "$ADB" connect "$PHONE_IP:5555"
          "$ADB" -s "$PHONE_IP:5555" wait-for-device
          "$ADB" -s "$PHONE_IP:5555" install -r --fastdeploy "$APK" \
            || "$ADB" -s "$PHONE_IP:5555" install -r "$APK"
          "$ADB" disconnect "$PHONE_IP:5555" || true
