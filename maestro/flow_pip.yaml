appId: dev.opux.tubeclient.debug
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      id: "home_video_0"
    timeout: 20000
- tapOn:
    id: "home_video_0"
- extendedWaitUntil:
    visible:
      id: "player_surface"
    timeout: 25000

# Wait for actual playback to start (so videoSize is known and player.isPlaying=true)
- waitForAnimationToEnd:
    timeout: 8000
- takeScreenshot: 01_player_fullscreen

# Press HOME — onUserLeaveHint should trigger enterPictureInPictureMode
- pressKey: Home
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: 02_pip_window

# Stay in PiP for a few seconds — playback must keep running and the new PiP
# RemoteActions (rewind / play-pause / forward) must not crash the activity.
- waitForAnimationToEnd:
    timeout: 4000

# Bring the activity back to the foreground without restarting it. The video
# surface should reattach immediately and report visible.
- launchApp:
    clearState: false
    stopApp: false
- extendedWaitUntil:
    visible:
      id: "player_surface"
    timeout: 10000
- takeScreenshot: 03_player_after_pip
